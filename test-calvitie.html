<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Calvitie - AMC</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-user-shield"></i>
            <span>AMC</span>
        </div>
        <ul class="nav-links">
            <li><a href="main.html" class="active"><i class="fas fa-home"></i> Accueil</a></li>
            <li><a href="actualites.html"><i class="fas fa-newspaper"></i> Actualité</a></li>
            <li><a href="goodies.html"><i class="fas fa-gift"></i> Goodies</a></li>
            <li><a href="photos.html"><i class="fas fa-images"></i> Photos</a></li>
            <li><a href="evenements.html"><i class="fas fa-calendar-alt"></i> Événements</a></li>
            <li><a href="test-calvitie.html"><i class="fa-solid fa-vial"></i> Test</a></li>
        </ul>
        <div class="nav-toggle">
            <i class="fas fa-bars"></i>
        </div>
    </nav>
    
    <div class="test-container">
        <div class="test-title">
            <h1><i class="fas fa-vial"></i> TEST DE CALVITIE</h1>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Question 1 -->
        Prochainement

    <script>
        // Questions et options
        const questions = document.querySelectorAll('.question');
        const options = document.querySelectorAll('.option');
        const progressBar = document.getElementById('progressBar');
        const resultDiv = document.getElementById('result');
        const resultTitle = document.getElementById('resultTitle');
        const resultDescription = document.getElementById('resultDescription');

        // Boutons de navigation
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const submitBtn = document.getElementById('submitBtn');

        // Variables de contrôle
        let currentQuestion = 0;
        let score = 0;

        // Fonction pour afficher une question
        function showQuestion(index) {
            questions.forEach((q, i) => {
                q.classList.toggle('active', i === index);
            });

            // Mettre à jour la barre de progression
            const progress = ((index + 1) / questions.length) * 100;
            progressBar.style.width = `${progress}%`;

            // Gérer les boutons de navigation
            prevBtn.disabled = index === 0;
            nextBtn.style.display = index === questions.length - 1 ? 'none' : 'block';
            submitBtn.style.display = index === questions.length - 1 ? 'block' : 'none';
        }

        // Question suivante
        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion(currentQuestion);
            }
        }

        // Question précédente
        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion(currentQuestion);
            }
        }

        // Sélectionner une option
        options.forEach(option => {
            option.addEventListener('click', () => {
                const question = option.closest('.question');
                const optionsInQuestion = question.querySelectorAll('.option');

                // Désélectionner toutes les options de la question
                optionsInQuestion.forEach(opt => opt.classList.remove('selected'));

                // Sélectionner l'option cliquée
                option.classList.add('selected');
            });
        });

        // Calculer le score final (nombre de bonnes réponses)
        function calculateScore() {
            score = 0;

            questions.forEach(question => {
                const selectedOption = question.querySelector('.option.selected');
                if (selectedOption && selectedOption.classList.contains('good')) {
                    score++;
                }
            });

            return score;
        }

        // Afficher le résultat
        function showResult() {
            // Masquer le test
            document.querySelector('.test-container > *:not(.result)').style.display = 'none';

            // Calculer le score
            const finalScore = calculateScore();

            // Déterminer le classement
            let title, description;

            if (finalScore === 7) {
                title = "Légendaire";
                description = "Le niveau le plus élevé des rangs de Chauve. Votre cuir chevelu brille comme un phare dans la nuit, il est une référence absolue. Vous êtes un modèle pour tous les aspirants chauves.";
            } else if (finalScore >= 5) {
                title = "Or";
                description = "Votre niveau est exceptionnel et vous faites partie de l'élite des chauves. Un style incontestable.";
            } else if (finalScore >= 3) {
                title = "Argent";
                description = "Un niveau très respectable ! Vous avez une calvitie bien marquée qui vous donne ce style distinctif et élégant. Vous faites partie des chauves les plus stylés, et votre présence est toujours remarquée. Avec un peu plus d'entretien, vous pourriez viser l'Or !";
            } else if (finalScore >= 1) {
                title = "Bronze";
                description = "Vous êtes sur la bonne voie ! Votre calvitie commence à se dessiner, et c'est le début d'une belle aventure. Gardez le cap !";
            } else {
                title = "Fer";
                description = "Vous débutez votre parcours chauve, mais ne vous inquiétez pas ! Chaque grand chauve a commencé quelque part. Votre cuir chevelu est encore en pleine exploration, et avec le temps, vous développerez ce style unique qui fait la fierté des chauves. Persévérez";
            }

            // Afficher le résultat
            resultTitle.textContent = title;
            resultDescription.textContent = description;
            resultDiv.style.display = 'block';
        }

        // Réinitialiser le test
        function resetTest() {
            currentQuestion = 0;
            score = 0;
            options.forEach(opt => opt.classList.remove('selected'));
            showQuestion(0);
            resultDiv.style.display = 'none';
            document.querySelector('.test-container > *:not(.result)').style.display = 'block';
        }

        // Initialiser le test
        showQuestion(currentQuestion);
    </script>
</body>
</html>
